name: Notion → Linear Sync (Requests BI)

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      - name: Run Notion → Linear sync
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          REQUESTS_BI: ${{ secrets.REQUESTS_BI }}

          # 👇 TUS SECRETS
          LINEAR_TEAM_JOYERIASUAREZ: ${{ secrets.LINEAR_TEAM_JOYERIASUAREZ }}
          LINEAR_BIREQUESTS_GRUPOSUAREZ: ${{ secrets.LINEAR_BIREQUESTS_GRUPOSUAREZ }}

        run: python scripts/notion_to_linear.py
