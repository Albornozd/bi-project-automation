name: Fetch Linear Issues

on:
  workflow_dispatch:  # Se puede ejecutar manualmente

jobs:
  fetch_json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Linear issues
        run: python scripts/fetch_linear_issues.py
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}

      - name: Show generated JSON
        run: |
          echo "======= JSON OUTPUT ======="
          cat issues.json
          echo "==========================="
