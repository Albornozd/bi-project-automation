name: Backlog Report

on:
  schedule:
    - cron: "0 8 * * 1" # Cada lunes 8 AM
  workflow_dispatch:

jobs:
  backlog_report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Download Linear Issues
        uses: actions/download-artifact@v3
        with:
          name: linear_issues
          path: data

      - run: python scripts/generate_report.py
        env:
          INPUT_FILE: data/linear_issues.json
          OUTPUT_FILE: reports/backlog_report.md
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit backlog report
        run: |
          git config --global user.name "automation-bot"
          git config --global user.email "bot@github.com"
          git add reports/
          git commit -m "Update backlog report" || echo "no changes"
          git push
