name: Backlog Report

on:
  schedule:
    - cron: "0 8 * * 1" # Lunes 8AM
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Download Linear issues
        uses: actions/download-artifact@v4
        with:
          name: linear_issues
          path: data/

      - run: python scripts/generate_report.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          INPUT_FILE: data/linear_issues.json
          OUTPUT_FILE: reports/backlog_report.md

      - name: Commit report
        run: |
          git config --global user.name "automation-bot"
          git config --global user.email "bot@github.com"
          git add reports/
          git commit -m "Update backlog report" || echo "No changes to commit"
          git push || echo "Push failed, possibly due to permissions"
