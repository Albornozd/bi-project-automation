name: Weekly BI Report

on:
  schedule:
    - cron: "0 10 * * 1" # Cada lunes 10 AM
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Get Linear Issues
        run: python scripts/get_linear_issues.py
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}

      - name: Generate Weekly Report
        run: python scripts/weekly_report.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          INPUT_FILE: data/linear_issues.json
          OUTPUT_FILE: reports/weekly_report.md
        continue-on-error: true

      - name: Commit report
        run: |
          git config --global user.name "automation-bot"
          git config --global user.email "bot@github.com"
          git add reports/
          git commit -m "Update weekly report" || echo "no changes"
          git push
