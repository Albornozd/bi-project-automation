name: Roadmap Generator

on:
  schedule:
    - cron: "0 12 * * 1" # Cada lunes a las 12 PM
  workflow_dispatch:

jobs:
  roadmap:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Crear carpeta reports
        run: mkdir -p reports

      - name: Generar Roadmap
        run: python scripts/roadmap_generator.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          INPUT_FILE: "data/linear_issues.json"
          OUTPUT_FILE: "reports/roadmap.md"

      - name: Commit roadmap
        run: |
          git config --global user.name "automation-bot"
          git config --global user.email "bot@github.com"
          git add reports/roadmap.md
          git commit -m "Update roadmap" || echo "No changes to commit"
          git push
