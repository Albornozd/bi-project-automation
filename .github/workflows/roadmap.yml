name: Roadmap Generator

on:
  schedule:
    - cron: "0 12 * * 1" # Cada lunes a las 12 PM
  workflow_dispatch:

jobs:
  generate_roadmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Download Linear Issues
        uses: actions/download-artifact@v4
        with:
          name: linear_issues
          path: data

      - run: python scripts/roadmap_generator.py
        env:
          INPUT_FILE: data/linear_issues.json
          OUTPUT_FILE: reports/roadmap.md
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}

      - name: Commit roadmap
        run: |
          git config --global user.name "automation-bot"
          git config --global user.email "bot@github.com"
          git add reports/
          git commit -m "Update roadmap" || echo "no changes"
          git push
