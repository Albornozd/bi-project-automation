name: Linear Sync

on:
  schedule:
    - cron: "0 */6 * * *" # Cada 6 horas
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Crear carpeta data
        run: mkdir -p data

      - name: Obtener issues de Linear
        run: python scripts/linear_fetch.py
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}

      - name: Subir artifacts para otros workflows
        uses: actions/upload-artifact@v4
        with:
          name: linear_issues
          path: data/linear_issues.json
